<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSS media query</title>
    <style>
      body {
        background-color: red;
      }

      @media only screen and (min-width: 500px) {
        body {
          background-color: blue;
        }
      }
    </style>
  </head>

  <body>
    <div>Hey I am red body guy!</div>
  </body>
</html>
