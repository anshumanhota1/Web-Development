<!-- You are given 12 files; 6 audio and 6 video.
    Design a website using html only which shows these 12 files.
    1.mp3, 2.mp3 .... 6.mp3
    1.mp4, 2.mp4 .... 6.mp4 -->

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Website</title>
  </head>
  <body>
    <header>
      <h1>Media Gallery</h1>
      <p>Listen to audio clips and watch videos below</p>
    </header>

    <main>
      <section>
        <h2>?? Audio Files</h2>
        <ul>
          <li><audio controls src="1.mp3"></audio></li>
          <li><audio controls src="2.mp3"></audio></li>
          <li><audio controls src="3.mp3"></audio></li>
          <li><audio controls src="4.mp3"></audio></li>
          <li><audio controls src="5.mp3"></audio></li>
          <li><audio controls src="6.mp3"></audio></li>
        </ul>
      </section>

      <section>
        <h2>?? Video Files</h2>
        <ul>
          <li><video controls width="320" src="1.mp4"></video></li>
          <li><video controls width="320" src="2.mp4"></video></li>
          <li><video controls width="320" src="3.mp4"></video></li>
          <li><video controls width="320" src="4.mp4"></video></li>
          <li><video controls width="320" src="5.mp4"></video></li>
          <li><video controls width="320" src="6.mp4"></video></li>
        </ul>
      </section>
    </main>

    <footer>
      <p>&copy; 2025 My Media Gallery</p>
    </footer>
  </body>
</html>
