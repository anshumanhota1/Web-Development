<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }

        html{
            font-size: 12px;
        }
        .box{
            box-sizing: border-box;
            border: 2px solid black;
            /* width: 1400px; */
            width: 80vw;
            height: 10vh;
            margin: auto;
            background-color: aquamarine;
        }

        .container{
            box-sizing: border-box;
            border: 2px solid black;
            /* width: 1400px; */
            width: 80vw;
            height: 80vh;
            margin: 23px auto;
            font-size: 18px;
            background-color: aquamarine;
            
        }
        /* .container p{
            font-size: 2em;
        } */
         .container p{
            font-size: 2rem;
            width: 50%;
        }
        .mycont{
            border: 2px solid black;
            box-sizing: border-box;
            background-color: hotpink;
            margin: 23px auto;
            color: rgb(22, 22, 21);
            font-size: 22px;
            /* width: 100vmax; */
            width: 100vmin;

        }
    </style>
</head>
<body>
    <div class="box">
        This is a box
    </div>
    <div class="container">
        <p>
            Lorem ipsum dolor sit amet consectetur adipisicing elit. Aspernatur cupiditate delectus ipsa. Sit ad, quaerat qui consequatur deserunt, fugiat distinctio suscipit eum porro alias perspiciatis magni incidunt repellendus, iusto aliquid.
        </p>
    </div>

    <div class="mycont">
        I am another container
    </div>
</body>
</html>
