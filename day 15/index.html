<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSS Boxmodel</title>
    <style>
      * {
        margin: 0;
        padding: 0;
      }
      .box1 {
        background-color: aquamarine;
        color: crimson;
        margin: 10px;
        padding: 5px;
        border: 2px, solid black;
        height: 200px;
        box-sizing: border-box;
      }
      .box2 {
        background-color: blueviolet;
      }
    </style>
  </head>
  <body>
    <div class="box1">I am a box</div>
    <div class="box2">I am an another box</div>
  </body>
</html>
