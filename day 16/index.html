<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fonts & CSS</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Playwrite+AU+QLD&family=Playwrite+HU:wght@100..400&family=Sankofa+Display&display=swap");

      h1 {
        font-family: "Playwrite AU QLD", cursive;
      }
      p {
        font-family: "Playwrite AU QLD", cursive;

        /* font-style:italic;

            font-weight: 500; */

      }

      h2{
        text-transform: capitalize;
      }
      h3{
        text-transform:uppercase;
        text-decoration: underline;
        text-decoration-color:blue;
        text-decoration-style:wavy;
        text-decoration-thickness:5px;
        text-indent: 110px;
        
      }
      .lorem{
        border: 2px solid red;
        width: 145px;
        text-overflow:ellipsis;
        /* overflow:scroll; */
        overflow: hidden;
        word-break: break-all;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div>
      <h1>We will study about multiple fonts</h1>
      <p>This is a video on fonts.</p>
    </div>

    <h2>about fonts</h2>
    <h3>hello everyone</h3>

    <p class="lorem">Lorem ipsum dolor sit amet consectetur adipisicing elit. Pariatur, earum? Ducimus, facilis architecto. Possimus, doloremque?.</p>
  </body>
</html>
