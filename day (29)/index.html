<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Card Creation</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <div class="card">
      <img src="image-1.jpg" alt="imageuuu" />
      <div class="card-content">
        <div class="tags">
          <span class="tag">School</span>
          <span class="tag">Student</span>
        </div>
        <div class="title">Abhijeet Sinha</div>
        <div class="description">
          Abhijeet is focused on learning and personal growth. Passionate about
          knowledge, he participate in activities and strive for excellence in
          every subject.
        </div>
        <a href="#" class="read-more">Read More</a>
      </div>
    </div>
  </body>
</html>
